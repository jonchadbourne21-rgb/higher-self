<!doctype html>
<html lang="en" data-theme="dark">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="Mentrove — Your AI Mirror for personal growth, self-reflection, and emotional clarity. Daily check-ins, guided journaling, and AI-powered insights to help you become your highest self." />
    <meta name="keywords" content="AI mirror, personal growth, self-reflection, daily check-in, emotional clarity, mindfulness app" />

    <!-- Favicon & App Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Open Graph Tags for Social Media Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Mentrove — Your AI Mirror for Personal Growth" />
    <meta property="og:description" content="Transform your life with daily check-ins, AI insights, and personalized guidance across 6 life domains. Reflect. Grow. Evolve." />
    <meta property="og:url" content="https://mentrove.manus.space" />
    <meta property="og:site_name" content="Mentrove" />
    <meta property="og:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663398434536/LQwmD5t86EFFZjkEDkXbgz/mentrove-og-image-fXafftVRPATb3Xg9mamEZ6.png" />
    <meta property="og:image:secure_url" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663398434536/LQwmD5t86EFFZjkEDkXbgz/mentrove-og-image-fXafftVRPATb3Xg9mamEZ6.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Mentrove — Your AI Mirror for personal growth, self-reflection, and emotional clarity" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@mentrove" />
    <meta name="twitter:creator" content="@mentrove" />
    <meta name="twitter:title" content="Mentrove — Your AI Mirror for Personal Growth" />
    <meta name="twitter:description" content="Transform your life with daily check-ins, AI insights, and personalized guidance across 6 life domains. Reflect. Grow. Evolve." />
    <meta name="twitter:image" content="https://d2xsxph8kpxj0f.cloudfront.net/310519663398434536/LQwmD5t86EFFZjkEDkXbgz/mentrove-og-image-fXafftVRPATb3Xg9mamEZ6.png" />
    <meta name="twitter:image:alt" content="Mentrove — Your AI Mirror for personal growth, self-reflection, and emotional clarity" />

    <!-- Additional SEO Meta -->
    <meta name="author" content="Mentrove" />
    <meta name="robots" content="index, follow" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F0A2E" />
    
    <!-- Dark theme CSS preload — prevents white flash during OAuth redirect -->
    <style>
      :root {
        --background: oklch(0.08 0.02 280);              /* #0B0B0F equivalent */
        --foreground: oklch(0.93 0.01 270);              /* soft white */
        --card: oklch(0.12 0.03 280);
        --card-foreground: oklch(0.93 0.01 270);
        --primary: oklch(0.65 0.16 185);                 /* teal */
        --primary-foreground: oklch(0.99 0.00 0);
        --muted: oklch(0.20 0.03 280);
        --muted-foreground: oklch(0.58 0.03 270);
        --border: oklch(0.24 0.04 280);
      }
      
      html, body {
        background-color: #0B0B0F;
        background-color: oklch(0.08 0.02 280);
        color: oklch(0.93 0.01 270);
        color-scheme: dark;
      }
      
      #root {
        background-color: #0B0B0F;
        background-color: oklch(0.08 0.02 280);
        color: oklch(0.93 0.01 270);
      }
    </style>
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mentrove" />

    <title>Mentrove — Your AI Mirror for Personal Growth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://mentrove.manus.space" />
  </head>

  <body>
    <div id="root">
      <!-- SEO fallback content for crawlers before React hydration -->
      <h1>Mentrove — Your AI Mirror for Personal Growth</h1>
      <h2>Daily check-ins, guided journaling, and AI-powered insights to help you become your highest self.</h2>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
